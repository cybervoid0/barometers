name: CI

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # prisma.config.ts requires this to resolve even for `prisma generate`;
      # no connection is made, so a dummy value (repo variable) is sufficient.
      DATABASE_URL: ${{ vars.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint (biome)
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests (jest)
        run: bun run jest
